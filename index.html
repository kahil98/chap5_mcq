<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Management Chapter 4 MCQ Quiz</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
      --hover: #f3f4f6;
      --correct: #dcfce7;
      --correct-border: #16a34a;
      --wrong: #fee2e2;
      --wrong-border: #dc2626;
      --accent: #1d4ed8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 18px 50px;
    }
    .header {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 22px;
      box-shadow: 0 8px 24px rgba(0,0,0,.05);
    }
    .header h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    .header p {
      margin: 4px 0;
      color: var(--muted);
    }
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    button.control {
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }
    button.control:hover { background: var(--hover); }
    .question-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,.04);
    }
    .q-number {
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 15px;
    }
    .q-text {
      font-size: 18px;
      margin-bottom: 14px;
      white-space: pre-wrap;
    }
    .options {
      display: grid;
      gap: 10px;
    }
    .option {
      width: 100%;
      text-align: left;
      background: white;
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 13px 14px;
      cursor: pointer;
      font-size: 16px;
      transition: background .15s ease, border-color .15s ease, transform .05s ease;
    }
    .option:hover {
      background: var(--hover);
    }
    .option:active {
      transform: translateY(1px);
    }
    .option.correct {
      background: var(--correct);
      border-color: var(--correct-border);
    }
    .option.wrong {
      background: var(--wrong);
      border-color: var(--wrong-border);
    }
    .option.disabled {
      cursor: default;
    }
    .feedback {
      margin-top: 10px;
      font-weight: 700;
      min-height: 22px;
    }
    .feedback.correct { color: #166534; }
    .feedback.wrong { color: #991b1b; }
    .footer {
      text-align: center;
      color: var(--muted);
      margin-top: 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>Project Management: Achieving Competitive Advantage, 5e (Pinto)</h1>
      <p><strong>Chapter 4:</strong> Leadership and the Project Manager</p>
      <p>This file includes all <strong>66 MCQ questions</strong> from the PDF, with wording and answer choices preserved from the source.</p>
      <div class="controls">
        <button class="control" onclick="resetQuiz()">Reset all answers</button>
      </div>
    </div>

    <div id="quiz"></div>

    <div class="footer">
      Interactive HTML quiz generated from the uploaded PDF.
    </div>
  </div>

  <script>
const questions = [

  { number: 105, question: "Key sustainability concept:", options: { A: "Long-term focus.", B: "Consume income not capital.", C: "Think globally.", D: "Increase risk." }, answer: "B" },

  { number: 106, question: "Sustainability requires focus on:", options: { A: "Planning.", B: "Conceptualization.", C: "Execution.", D: "Entire lifecycle." }, answer: "D" }
];
    function optionHtml(qIndex, label, text) {
      return `
        <button class="option" data-q="${qIndex}" data-choice="${label}" onclick="selectAnswer(${qIndex}, '${label}')">
          <strong>${label})</strong> ${escapeHtml(text)}
        </button>
      `;
    }

    function escapeHtml(str) {
      return str
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderQuiz() {
      const container = document.getElementById("quiz");
      container.innerHTML = questions.map((q, i) => `
        <section class="question-card" id="q-${q.number}">
          <div class="q-number">Question ${q.number}</div>
          <div class="q-text">${escapeHtml(q.question)}</div>
          <div class="options">
            ${optionHtml(i, 'A', q.options.A)}
            ${optionHtml(i, 'B', q.options.B)}
            ${optionHtml(i, 'C', q.options.C)}
            ${optionHtml(i, 'D', q.options.D)}
          </div>
          <div class="feedback" id="feedback-${i}"></div>
        </section>
      `).join("");
    }

     function selectAnswer(index, choice) {
    const q = questions[index];
    const buttons = document.querySelectorAll(`button[data-q="${index}"]`);
    const feedback = document.getElementById(`feedback-${index}`);

    if ([...buttons].some(btn => btn.classList.contains("disabled"))) return;

    buttons.forEach(btn => {
      btn.classList.add("disabled");
      const btnChoice = btn.dataset.choice;

      if (choice === q.answer) {
        if (btnChoice === choice) {
          btn.classList.add("correct");
        }
      } else {
        if (btnChoice === choice) {
          btn.classList.add("wrong");
        }
        if (btnChoice === q.answer) {
          btn.classList.add("correct");
        }
      }
    });

    if (choice === q.answer) {
      feedback.textContent = "Correct";
      feedback.className = "feedback correct";
    } else {
      feedback.textContent = `Incorrect. Correct answer: ${q.answer}`;
      feedback.className = "feedback wrong";
    }
  }

    function resetQuiz() {
      document.querySelectorAll(".option").forEach(btn => {
        btn.classList.remove("correct", "wrong", "disabled");
      });
      document.querySelectorAll(".feedback").forEach(f => {
        f.textContent = "";
        f.className = "feedback";
      });
      window.scrollTo({ top: 0, behavior: "smooth" });
    }


    renderQuiz();
  </script>
</body>
</html>
